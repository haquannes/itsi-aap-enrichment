---
# ITSI -> AAP closed-loop enrichment playbook
#
# ITSI bir episode actiginda (NEAP action) bu job template launch edilir.
# Playbook, OCP API'sine sorarak bozuk workload hakkinda PLATFORM KANITI toplar
# (pod/node'a hic dokunmadan; ubuntu-target ImagePullBackOff oldugu icin SSH imkansiz),
# ve sonucu Splunk HEC ile otel_logs index'ine geri yazar -> ITSI episode drilldown'da gorunur.
#
# Tum parametreler extra_vars'tan gelir (ITSI gecer). Asagidaki default'lar elle test icindir.

- name: ITSI enrichment - collect platform evidence for a failing workload
  hosts: localhost
  gather_facts: false
  connection: local

  vars:
    # --- ITSI'in gecdigi episode parametreleri (extra_vars override eder) ---
    episode_id: "MANUAL-TEST"
    itsi_service: "AAP Managed Nodes"
    kpi: "Image Pull Failure Rate"
    severity: "critical"
    target_ns: "ansible-targets"        # OCP namespace ('namespace' Ansible'da reserved)
    workload: "ubuntu-target"           # deployment adi

    # --- OCP API erisimi (AAP credential/extra_vars ile saglanir) ---
    ocp_api: "{{ lookup('env', 'OCP_API') | default('https://kubernetes.default.svc', true) }}"
    ocp_token: "{{ lookup('env', 'OCP_TOKEN') | default('', true) }}"
    ocp_validate_certs: false

    # --- Splunk HEC geri-yazma ---
    hec_url: "https://borealis.sekom.local:8088/services/collector/event"
    hec_token: "{{ lookup('env', 'HEC_TOKEN') | default('', true) }}"
    hec_index: "otel_logs"
    hec_sourcetype: "itsi:aap:enrichment"
    hec_validate_certs: false

  tasks:

    - name: Record start time
      ansible.builtin.set_fact:
        enrich_started: "{{ '%Y-%m-%dT%H:%M:%S' | strftime }}"

    # ---------------------------------------------------------------
    # 1) Hedef workload'in istedigi image:tag (deployment spec)
    # ---------------------------------------------------------------
    - name: Get deployment spec (desired image)
      ansible.builtin.uri:
        url: "{{ ocp_api }}/apis/apps/v1/namespaces/{{ target_ns }}/deployments/{{ workload }}"
        method: GET
        headers:
          Authorization: "Bearer {{ ocp_token }}"
        validate_certs: "{{ ocp_validate_certs }}"
        return_content: true
        status_code: [200, 401, 403, 404]
      register: dep
      ignore_errors: true

    - name: Mark whether OCP API is reachable/authorized
      ansible.builtin.set_fact:
        ocp_ok: "{{ (dep.status | default(0)) == 200 }}"
        ocp_http: "{{ dep.status | default(0) }}"

    - name: Extract desired image / replica status (only when 200)
      ansible.builtin.set_fact:
        desired_image: "{{ dep.json.spec.template.spec.containers | map(attribute='image') | list }}"
        pull_policy: "{{ dep.json.spec.template.spec.containers | map(attribute='imagePullPolicy') | list }}"
        replicas_desired: "{{ dep.json.spec.replicas | default('?') }}"
        replicas_ready: "{{ dep.json.status.readyReplicas | default(0) }}"
      when: ocp_ok | bool

    # ---------------------------------------------------------------
    # 2) Namespace event'leri (ImagePull / Failed / BackOff kaniti)
    # ---------------------------------------------------------------
    - name: Get namespace events
      ansible.builtin.uri:
        url: "{{ ocp_api }}/api/v1/namespaces/{{ target_ns }}/events?limit=200"
        method: GET
        headers:
          Authorization: "Bearer {{ ocp_token }}"
        validate_certs: "{{ ocp_validate_certs }}"
        return_content: true
        status_code: [200, 401, 403, 404]
      register: evs
      ignore_errors: true
      when: ocp_ok | bool

    - name: Filter image-pull / failure events
      ansible.builtin.set_fact:
        pull_events: >-
          {{ (evs.json['items'] | default([]))
             | selectattr('reason', 'in', ['Failed', 'BackOff', 'ErrImagePull', 'ImagePullBackOff'])
             | map(attribute='message') | list | unique }}
        pull_event_count: >-
          {{ (evs.json['items'] | default([]))
             | selectattr('reason', 'in', ['Failed', 'BackOff', 'ErrImagePull', 'ImagePullBackOff'])
             | map(attribute='count') | map('int') | sum }}
      when: ocp_ok | bool and evs is defined and evs.json is defined

    # ---------------------------------------------------------------
    # 3) Tani ozeti olustur (OCP erisilse de erisilmese de calisir)
    # ---------------------------------------------------------------
    - name: Build enrichment payload
      ansible.builtin.set_fact:
        enrichment:
          episode_id: "{{ episode_id }}"
          itsi_service: "{{ itsi_service }}"
          kpi: "{{ kpi }}"
          severity: "{{ severity }}"
          namespace: "{{ target_ns }}"
          workload: "{{ workload }}"
          collected_at: "{{ enrich_started }}"
          collected_by: "AAP ITSI Enrichment job (template launch)"
          ocp_reachable: "{{ ocp_ok | bool }}"
          ocp_http_status: "{{ ocp_http }}"
          desired_image: "{{ desired_image | default([]) }}"
          image_pull_policy: "{{ pull_policy | default([]) }}"
          replicas_desired: "{{ replicas_desired | default('?') }}"
          replicas_ready: "{{ replicas_ready | default(0) }}"
          image_pull_event_count: "{{ pull_event_count | default(0) }}"
          image_pull_messages: "{{ (pull_events | default([]))[:5] }}"
          diagnosis: >-
            {% if not (ocp_ok | bool) %}
            COLLECTION INCOMPLETE: OCP API returned HTTP {{ ocp_http }} (token invalid/expired or RBAC).
            Refresh the OCP service-account token in the AAP credential, then re-run enrichment.
            {% elif (replicas_ready | default(0) | int) == 0 and (pull_event_count | default(0) | int) > 0 %}
            ROOT CAUSE: Image pull failing for {{ desired_image | default(['?']) | join(',') }}
            (pullPolicy={{ pull_policy | default(['?']) | join(',') }}). Registry tag unavailable
            (manifest unknown / pruned). Pod cannot start -> 0/{{ replicas_desired | default('?') }} ready.
            Remediation: re-push or correct image tag in registry, then rollout restart.
            {% else %}
            No conclusive image-pull root cause from platform evidence; review collected events.
            {% endif %}

    - name: Show enrichment (job output)
      ansible.builtin.debug:
        var: enrichment

    # ---------------------------------------------------------------
    # 4) Splunk HEC'e geri yaz -> ITSI episode drilldown
    # ---------------------------------------------------------------
    - name: Send enrichment to Splunk HEC (otel_logs)
      ansible.builtin.uri:
        url: "{{ hec_url }}"
        method: POST
        headers:
          Authorization: "Splunk {{ hec_token }}"
        body_format: json
        body:
          index: "{{ hec_index }}"
          sourcetype: "{{ hec_sourcetype }}"
          event: "{{ enrichment }}"
        validate_certs: "{{ hec_validate_certs }}"
        status_code: [200]
      register: hec_resp
      when: hec_token | length > 0
      ignore_errors: true

    - name: Confirm HEC delivery
      ansible.builtin.debug:
        msg: >-
          Enrichment for episode {{ episode_id }} ->
          HEC {{ hec_index }}/{{ hec_sourcetype }}:
          {{ 'sent' if (hec_resp.status | default(0)) == 200 else 'SKIPPED (no hec_token)' }}
          | OCP HTTP {{ ocp_http }}
